<!DOCTYPE html>
<html>
<head>
    <title>ChatterBox</title>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --messenger-blue: linear-gradient(135deg, #0084ff, #00c6ff);
            --text-main: #ffffff;
            --server-bubble: #2b2b2b;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #join-screen { background: var(--surface); padding: 40px; border-radius: 12px; text-align: center; width: 350px; border: 1px solid #333; }
        input { background: #000; border: 1px solid #444; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 20px; outline: none; }
        .join-btn { background: #5b5fc7; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }

        #chat-container { display: none; width: 100%; height: 100%; flex-direction: column; }
        #header { padding: 18px 25px; background: var(--surface); border-bottom: 1px solid #333; font-size: 1.2em; font-weight: 700; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 14.5px; position: relative; }
        .user-msg { align-self: flex-end; background: var(--messenger-blue); border-bottom-right-radius: 4px; }
        .server-msg { align-self: flex-start; background-color: var(--server-bubble); border-bottom-left-radius: 4px; border: 1px solid #444; }

        .meta { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.8; letter-spacing: 0.5px; }
        #input-area { padding: 20px; background: var(--surface); display: flex; gap: 12px; }
    </style>
</head>
<body>

    <div id="join-screen">
        <h2 style="color: #5b5fc7;">ChatterBox</h2>
        <input type="text" id="usernameInput" placeholder="Enter your name exactly...">
        <button class="join-btn" onclick="joinChat()">Join now</button>
    </div>

    <div id="chat-container">
        <div id="header">ChatterBox</div>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
            <button class="join-btn" style="width: 80px;" onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let username = "";
        let socket;

        function joinChat() {
            const nameInput = document.getElementById('usernameInput');
            if (nameInput.value.trim() === "") return;

            username = nameInput.value;
            
            document.getElementById('join-screen').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            
            socket = new WebSocket("ws://localhost:8000/ws");
            
            socket.onmessage = (event) => {
                renderMessage("Server", event.data, 'server-msg');
            };
        }

        function renderMessage(name, text, type) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerHTML = `<div class="meta">${name}</div><div>${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                const text = input.value;
                renderMessage(username, text, 'user-msg');
                socket.send(text);
                input.value = "";
            }
        }
    </script>
</body>
</html>
